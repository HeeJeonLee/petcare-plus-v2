<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 다크 네이비 배경 -->
  <circle cx="200" cy="200" r="200" fill="url(#bg2)"/>

  <!-- 외곽 실버 링 -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>

  <!-- 배경 원형 패턴 -->
  <circle cx="200" cy="155" r="75" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <circle cx="200" cy="155" r="85" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>

  <!-- 방패 모양 (보험의 보호 이미지) -->
  <g transform="translate(200, 148)" filter="shadow2">
    <path d="M0,-65 C35,-65 60,-55 60,-40 L60,10 C60,45 30,65 0,75 C-30,65 -60,45 -60,10 L-60,-40 C-60,-55 -35,-65 0,-65 Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <!-- 방패 내부 채우기 -->
    <path d="M0,-60 C32,-60 55,-50 55,-37 L55,8 C55,40 28,60 0,70 C-28,60 -55,40 -55,8 L-55,-37 C-55,-50 -32,-60 0,-60 Z"
          fill="rgba(59,130,246,0.08)"/>
  </g>

  <!-- 방패 안 발바닥 -->
  <g transform="translate(200, 140)">
    <ellipse cx="0" cy="5" rx="22" ry="26" fill="url(#accent)" opacity="0.9"/>
    <ellipse cx="-22" cy="-18" rx="10" ry="13" fill="url(#accent)" opacity="0.9" transform="rotate(-12, -22, -18)"/>
    <ellipse cx="22" cy="-18" rx="10" ry="13" fill="url(#accent)" opacity="0.9" transform="rotate(12, 22, -18)"/>
    <ellipse cx="-10" cy="-26" rx="9" ry="11" fill="url(#accent)" opacity="0.9"/>
    <ellipse cx="10" cy="-26" rx="9" ry="11" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- + 마크 -->
  <g transform="translate(200, 196)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="url(#blueAccent)" filter="glow2">+</text>
  </g>

  <!-- 메인 텍스트 -->
  <text x="200" y="275" text-anchor="middle" font-family="'Georgia', serif" font-size="36" font-weight="bold" fill="url(#accent)" filter="glow2" letter-spacing="2">PetCare+</text>

  <!-- 구분선 -->
  <line x1="130" y1="290" x2="270" y2="290" stroke="url(#blueAccent)" stroke-width="1" opacity="0.4"/>

  <!-- 서브 정보 -->
  <text x="200" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="3">펫보험 비교 전문</text>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">이희전 | 25년 경력 컨설턴트</text>

  <!-- 하단 도트 장식 -->
  <circle cx="170" cy="370" r="1.5" fill="#60a5fa" opacity="0.4"/>
  <circle cx="185" cy="373" r="1" fill="#60a5fa" opacity="0.3"/>
  <circle cx="200" cy="374" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="215" cy="373" r="1" fill="#60a5fa" opacity="0.3"/>
  <circle cx="230" cy="370" r="1.5" fill="#60a5fa" opacity="0.4"/>
</svg>
