<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PetCare+ 블로그 프로필 이미지</title>
<style>
  body { margin: 0; padding: 40px; background: #f0f0f0; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; }
  .profile-card { text-align: center; }
  .profile-card h3 { margin: 10px 0 5px; font-family: sans-serif; }
  .profile-card p { margin: 0; color: #666; font-family: sans-serif; font-size: 14px; }
</style>
</head>
<body>

<!-- 옵션 1: 원형 그라데이션 + 발바닥 -->
<div class="profile-card">
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="shine1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 배경 원 -->
  <circle cx="200" cy="200" r="200" fill="url(#bg1)"/>
  <circle cx="200" cy="200" r="200" fill="url(#shine1)"/>

  <!-- 발바닥 아이콘 (큰 패드) -->
  <ellipse cx="200" cy="210" rx="55" ry="65" fill="white" opacity="0.95"/>
  <!-- 발가락 패드들 -->
  <ellipse cx="145" cy="150" rx="25" ry="30" fill="white" opacity="0.95" transform="rotate(-15, 145, 150)"/>
  <ellipse cx="255" cy="150" rx="25" ry="30" fill="white" opacity="0.95" transform="rotate(15, 255, 150)"/>
  <ellipse cx="175" cy="130" rx="22" ry="28" fill="white" opacity="0.95" transform="rotate(-5, 175, 130)"/>
  <ellipse cx="225" cy="130" rx="22" ry="28" fill="white" opacity="0.95" transform="rotate(5, 225, 130)"/>

  <!-- 텍스트 -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">PetCare+</text>
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)">펫보험 비교 플랫폼</text>
</svg>
<h3>옵션 1: 그라데이션 발바닥</h3>
<p>400x400px</p>
</div>

<!-- 옵션 2: 깔끔한 원형 로고 -->
<div class="profile-card">
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <circle cx="200" cy="200" r="200" fill="url(#bg2)"/>

  <!-- 하트 + 발바닥 결합 -->
  <g transform="translate(200, 170)">
    <!-- 하트 외곽 -->
    <path d="M0,30 C0,30 -70,-30 -70,-60 C-70,-95 -30,-95 0,-60 C30,-95 70,-95 70,-60 C70,-30 0,30 0,30 Z"
          fill="white" opacity="0.95" transform="scale(1.3)"/>
    <!-- 하트 안에 + 기호 -->
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#1e40af">+</text>
  </g>

  <!-- 텍스트 -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">PetCare+</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">8개사 펫보험 비교 전문</text>
  <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">25년 경력 이희전 상담사</text>
</svg>
<h3>옵션 2: 하트 + 로고</h3>
<p>400x400px</p>
</div>

<!-- 옵션 3: 심플 텍스트 중심 -->
<div class="profile-card">
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="400" rx="40" fill="url(#bg3)"/>

  <!-- 상단 아이콘 영역 -->
  <circle cx="200" cy="130" r="65" fill="rgba(255,255,255,0.15)"/>

  <!-- 발바닥 (간결) -->
  <g transform="translate(200, 125)">
    <ellipse cx="0" cy="10" rx="28" ry="33" fill="white" opacity="0.95"/>
    <ellipse cx="-28" cy="-22" rx="13" ry="16" fill="white" opacity="0.95" transform="rotate(-15, -28, -22)"/>
    <ellipse cx="28" cy="-22" rx="13" ry="16" fill="white" opacity="0.95" transform="rotate(15, 28, -22)"/>
    <ellipse cx="-12" cy="-32" rx="11" ry="14" fill="white" opacity="0.95"/>
    <ellipse cx="12" cy="-32" rx="11" ry="14" fill="white" opacity="0.95"/>
  </g>

  <!-- 메인 텍스트 -->
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">PetCare+</text>

  <!-- 구분선 -->
  <line x1="130" y1="260" x2="270" y2="260" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

  <!-- 서브 텍스트 -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.95)">펫보험 비교 플랫폼</text>
  <text x="200" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)">petcareplus.kr</text>

  <!-- 하단 태그 -->
  <rect x="100" y="350" width="200" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white">25년 경력 전문가 무료 상담</text>
</svg>
<h3>옵션 3: 심플 라운드</h3>
<p>400x400px</p>
</div>

<div style="width:100%; text-align:center; font-family:sans-serif; margin-top:20px; color:#333;">
  <h2>사용법</h2>
  <p>1. 원하는 이미지에서 마우스 오른쪽 클릭 → "이미지로 저장"</p>
  <p>2. 네이버 블로그 → 관리 → 프로필 → 프로필 이미지 변경</p>
  <p>3. 저장한 이미지 업로드</p>
</div>

</body>
</html>
