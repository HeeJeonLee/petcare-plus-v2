<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 다크 배경 -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- 외곽 골드 링 -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.8"/>
  <circle cx="200" cy="200" r="183" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>

  <!-- 미세한 패턴 (고급감) -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="rgba(251,191,36,0.08)" stroke-width="40"/>

  <!-- 발바닥 아이콘 - 골드 -->
  <g filter="shadow">
    <ellipse cx="200" cy="180" rx="42" ry="50" fill="url(#gold)"/>
    <ellipse cx="155" cy="128" rx="19" ry="24" fill="url(#gold)" transform="rotate(-15, 155, 128)"/>
    <ellipse cx="245" cy="128" rx="19" ry="24" fill="url(#gold)" transform="rotate(15, 245, 128)"/>
    <ellipse cx="178" cy="112" rx="17" ry="21" fill="url(#gold)" transform="rotate(-5, 178, 112)"/>
    <ellipse cx="222" cy="112" rx="17" ry="21" fill="url(#gold)" transform="rotate(5, 222, 112)"/>
  </g>

  <!-- 발바닥 하이라이트 -->
  <ellipse cx="195" cy="172" rx="18" ry="22" fill="rgba(255,255,255,0.15)"/>

  <!-- 텍스트 -->
  <text x="200" y="275" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="38" font-weight="bold" fill="url(#goldLight)" filter="glow" letter-spacing="3">PetCare+</text>

  <!-- 구분선 -->
  <line x1="120" y1="292" x2="280" y2="292" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- 서브 텍스트 -->
  <text x="200" y="320" text-anchor="middle" font-family="'Georgia', serif" font-size="14" fill="#fbbf24" opacity="0.9" letter-spacing="5">PET INSURANCE</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(251,191,36,0.7)" letter-spacing="2">COMPARISON PLATFORM</text>

  <!-- 하단 장식 -->
  <circle cx="160" cy="372" r="2" fill="#fbbf24" opacity="0.5"/>
  <circle cx="200" cy="375" r="2.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="240" cy="372" r="2" fill="#fbbf24" opacity="0.5"/>
</svg>
